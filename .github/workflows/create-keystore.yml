name: Create Android Keystore (run once)

# Generates the upload keystore used to sign Play Store builds. Run this ONCE.
# Then download the artifact and save the 4 GitHub secrets (see PLAY-STORE-SETUP.md).
on:
  workflow_dispatch:
    inputs:
      key_alias:
        description: Key alias
        default: triam-upload
        required: true
      store_password:
        description: Keystore password (remember it!)
        required: true
      key_password:
        description: Key password (can be same as keystore password)
        required: true

jobs:
  keystore:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Generate keystore
        run: |
          keytool -genkeypair -v \
            -keystore triam-upload.jks \
            -alias "${{ github.event.inputs.key_alias }}" \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass "${{ github.event.inputs.store_password }}" \
            -keypass "${{ github.event.inputs.key_password }}" \
            -dname "CN=TRIAM A Plus, O=Amit Metaliks Limited, L=Kolkata, ST=West Bengal, C=IN"
          base64 -w0 triam-upload.jks > triam-upload.jks.b64
          echo "Keystore created. Add the secrets per PLAY-STORE-SETUP.md."
      - uses: actions/upload-artifact@v4
        with:
          name: triam-upload-keystore
          path: |
            triam-upload.jks
            triam-upload.jks.b64
          retention-days: 1
