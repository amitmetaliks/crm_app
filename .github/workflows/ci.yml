name: CI

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    services:
      mariadb:
        image: mariadb:10.8
        env:
          MARIADB_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=5s --health-timeout=5s --health-retries=15

      redis:
        image: redis:alpine
        ports:
          - 6379:6379

    steps:
      - name: Checkout crm_app
        uses: actions/checkout@v4
        with:
          path: crm_app

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          # Frappe's `version-16` branch is a rolling development branch, not
          # a frozen release — as of this writing `frappe==16.27.0`'s own
          # package metadata declares `Python>=3.14,<3.15` (and before that,
          # PEP 695 `type X = ...` syntax already required 3.12+). If this
          # drifts again, the failing "Init bench + apps" step's `uv pip
          # install` error names the required range directly — read it from
          # the log, don't guess (see hr_app's CI history for the exact
          # sequence this was discovered in).
          python-version: "3.14"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          # frappe's version-16 branch also bumped its own package.json
          # "engines.node" to >=24 — this Node is used to `yarn install`
          # frappe's own assets during bench init, unrelated to crm_app's own
          # (pre-built, committed) frontend.
          node-version: "24"

      - name: Install bench
        run: pip install frappe-bench

      - name: Init bench + apps (frappe v16, erpnext, crm, crm_app)
        run: |
          # bench init shells out to `yarn install --check-files` to build
          # frappe's own JS assets — not guaranteed present/on PATH just
          # because actions/setup-node ran. Install it explicitly.
          npm install -g yarn
          yarn --version
          bench init --skip-redis-config-generation --frappe-branch version-16 ~/frappe-bench
          cd ~/frappe-bench
          bench set-config -g db_host 127.0.0.1
          bench set-config -g redis_cache "redis://127.0.0.1:6379"
          bench set-config -g redis_queue "redis://127.0.0.1:6379"
          bench set-config -g redis_socketio "redis://127.0.0.1:6379"
          bench get-app erpnext --branch version-16
          bench get-app crm --branch main
          bench get-app "$GITHUB_WORKSPACE/crm_app"

      - name: Create site + install apps
        run: |
          cd ~/frappe-bench
          bench new-site test_site --mariadb-root-password root --admin-password admin \
            --mariadb-user-host-login-scope=% --install-app erpnext --install-app crm --install-app crm_app
          bench --site test_site migrate

      - name: Run crm_app tests
        run: |
          cd ~/frappe-bench
          bench --site test_site set-config allow_tests true
          bench --site test_site run-tests --app crm_app
