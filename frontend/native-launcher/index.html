<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>TRIAM A+</title>
    <style>
      :root { --navy:#15264C; --saffron:#E8541C; }
      * { box-sizing:border-box; }
      html,body { margin:0; height:100%; font-family:-apple-system,Roboto,"Segoe UI",sans-serif; }
      body { background:linear-gradient(160deg,#15264C,#233a6b); color:#fff; display:flex; align-items:center; justify-content:center; padding:24px; }
      .card { width:100%; max-width:380px; text-align:center; }
      .badge { width:80px;height:80px;border-radius:20px;background:var(--saffron);display:flex;align-items:center;justify-content:center;font-size:30px;font-weight:800;margin:0 auto 18px;box-shadow:0 10px 30px rgba(232,84,28,.4); }
      h1 { margin:0 0 4px;font-size:22px; } p { color:#c7d2e6;font-size:14px;margin:0 0 22px; }
      label { display:block;text-align:left;font-size:13px;color:#c7d2e6;margin:0 0 6px; }
      input { width:100%;padding:13px 14px;border-radius:12px;border:0;font-size:15px;color:#15264C; }
      button { width:100%;margin-top:16px;padding:14px;border:0;border-radius:14px;background:var(--saffron);color:#fff;font-size:16px;font-weight:700; }
      .err { color:#ffb4a1;font-size:13px;margin-top:10px;min-height:16px; }
      .hint { color:#9fb0cc;font-size:12px;margin-top:14px; }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="badge">A+</div>
      <h1>TRIAM A+</h1>
      <p>Field Sales</p>
      <label>Your TRIAM A+ server address</label>
      <input id="url" type="url" inputmode="url" autocomplete="url"
             placeholder="https://your-company-server" value="https://amitalliance.dexciss.tech" />
      <button id="go">Connect</button>
      <div class="err" id="err"></div>
      <div class="hint">Ask your admin for this address. It's saved on this device.</div>
    </div>
    <script>
      var KEY = "triam_server_url"
      function open(u) {
        u = (u || "").trim().replace(/\/+$/, "")
        if (!/^https:\/\/.+/.test(u)) { document.getElementById("err").textContent = "Enter a valid https:// address"; return }
        localStorage.setItem(KEY, u)
        window.location.href = u + "/amit-crm"
      }
      var saved = localStorage.getItem(KEY)
      if (saved) { window.location.href = saved + "/amit-crm" }
      document.getElementById("go").addEventListener("click", function () { open(document.getElementById("url").value) })
      document.getElementById("url").addEventListener("keydown", function (e) { if (e.key === "Enter") open(this.value) })
    </script>
  </body>
</html>
